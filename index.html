<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#18160f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PunchCard" />
  <title>PunchCard</title>
  <link rel="manifest" href="/manifest.json" />
  <!-- Replace with your built CSS bundle after `npm run build` -->
  <!-- <link rel="stylesheet" href="/static/css/main.abc123.css" /> -->
</head>
<body>
  <noscript>PunchCard requires JavaScript.</noscript>
  <div id="root"></div>

  <!-- Replace with your built JS bundle after `npm run build` -->
  <!-- <script src="/static/js/main.abc123.js"></script> -->

  <script>
    // Register service worker
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js")
          .then(reg => console.log("[App] SW registered:", reg.scope))
          .catch(err => console.warn("[App] SW registration failed:", err));
      });
    }
  </script>
</body>
</html>
