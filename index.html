// ── Version ───────────────────────────────────────────────────
const APP_VERSION = "1.1.1";

// ── Storage — Claude artifact uses window.storage, deployed uses localStorage
const appStorage = {
  async get(key) {
    try {
      if (typeof window !== 'undefined' && window.storage?.get) {
        return await window.storage.get(key);
      }
      const value = localStorage.getItem(key);
      return value ? { value } : null;
    } catch { return null; }
  },
  async set(key, value) {
    try {
      if (typeof window !== 'undefined' && window.storage?.set) {
        return await window.storage.set(key, value);
      }
      localStorage.setItem(key, value);
      return { key, value };
    } catch { return null; }
  }
};

// ── Constants ────────────────────────────────────────────────
const STORAGE_KEY = "punchcard-v2";
const REGULAR_START = 8 * 60;        // 8:00 AM in minutes
const REGULAR_END   = 16.5 * 60;     // 4:30 PM in minutes
const LUNCH_MIN     = 30;

// ── Helpers ──────────────────────────────────────────────────
const pad = (n) => String(n).padStart(2, "0");

function timeStrToMin(str) {
  const [h, m] = (str || "00:00").split(":").map(Number);
  return h * 60 + (m || 0);
}

function nowMin() {
  const d = new Date();
  return d.getHours() * 60 + d.getMinutes();
}

function isRegularTime(ts, startMin, endMin) {
  const d = new Date(ts);
  const min = d.getHours() * 60 + d.getMinutes();
  return min >= startMin && min < endMin;
}

function fmtTime(ts) {
  if (!ts) return "--:--";
  const d = new Date(ts);
  const h = d.getHours(), m = d.getMinutes();
  const ampm = h >= 12 ? "PM" : "AM";
  return `${pad(h % 12 || 12)}:${pad(m)} ${ampm}`;
}

function fmtHrs(ms) {
  if (!ms || ms < 0) return "0h 00m";
  const total = Math.floor(ms / 60000);
  const h = Math.floor(total / 60), m = total % 60;
  return `${h}h ${pad(m)}m`;
}

function fmtPay(hrs, rate) {
  return (hrs * rate).toLocaleString("en-US", { style: "currency", currency: "USD" });
}

function shiftNetMs(shift, autoLunchMs) {
  if (!shift.clockOut) return 0;
  const raw = shift.clockOut - shift.clockIn;
  const lms = autoLunchMs !== undefined ? autoLunchMs : LUNCH_MIN * 60000;
  const deduct = shift.lunchDuration != null && shift.lunchDuration > 0
    ? shift.lunchDuration
    : (shift.type === "regular" ? lms : 0);
  return Math.max(0, raw - deduct);
}

function shiftNetHrs(shift, autoLunchMs) {
  return shiftNetMs(shift, autoLunchMs) / 3600000;
}

function weekStart(date = new Date()) {
  const d = new Date(date);
  const day = d.getDay(); // 0=Sun
  d.setDate(d.getDate() - (day === 0 ? 6 : day - 1)); // Mon
  d.setHours(0, 0, 0, 0);
  return d;
}

function sameDay(a, b) {
  const da = new Date(a), db = new Date(b);
  return da.getFullYear() === db.getFullYear() &&
         da.getMonth() === db.getMonth() &&
         da.getDate() === db.getDate();
}

function dayLabel(date) {
  return new Date(date).toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
}

function fmtDateShort(date) {
  return new Date(date).toLocaleDateString("en-US", { month: "short", day: "numeric" });
}

// Given a known anchor (start of any past pay period), find the current period's start
function getPeriodStart(anchorStr, now = new Date()) {
  const anchor = new Date(anchorStr);
  anchor.setHours(0, 0, 0, 0);
  const today = new Date(now);
  today.setHours(0, 0, 0, 0);
  const diffDays = Math.floor((today - anchor) / 86400000);
  const periodsElapsed = Math.floor(diffDays / 14);
  const start = new Date(anchor);
  start.setDate(anchor.getDate() + periodsElapsed * 14);
  return start;
}

function getPeriodDays(anchorStr, now = new Date()) {
  const start = getPeriodStart(anchorStr, now);
  return Array.from({ length: 14 }, (_, i) => {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    return d;
  });
}

// ── Tax Engine (2025 rates) ───────────────────────────────────

function applyBrackets(taxable, brackets) {
  let tax = 0;
  for (const [limit, rate, base] of brackets) {
    if (taxable <= 0) break;
    const prev = base;
    if (taxable > (limit ?? Infinity)) {
      // Not the top bracket — move on
    } else {
      // Taxable falls in this bracket
      tax = prev + taxable * rate;
      return tax;
    }
  }
  // Top bracket
  const top = brackets[brackets.length - 1];
  return top[2] + taxable * top[1];
}

// Federal income tax — annualized income, after standard deduction
const FED_BRACKETS = {
  single: [
    [11925,   0.10, 0],
    [48475,   0.12, 1192.50],
    [103350,  0.22, 5578.50],
    [197300,  0.24, 17651.00],
    [250525,  0.32, 40199.00],
    [626350,  0.35, 57231.00],

  married: [

    [206700,  0.22, 11157.00],
    [394600,  0.24, 35302.00],
    [501050,  0.32, 80398.00],
    [751600,  0.35, 114462.00],
    [Infinity,0.37, 202154.50],
  ],
};

const FED_STD_DEDUCTION = { single: 15000, married: 30000 };

function calcFederalTax(annualGross, filingStatus) {
  const taxable = Math.max(0, annualGross - FED_STD_DEDUCTION[filingStatus]);
  const brackets = FED_BRACKETS[filingStatus];
  let prev = 0, tax = 0;
  for (const [limit, rate, _base] of brackets) {
    const cap = limit === Infinity ? taxable : Math.min(taxable, limit);
    if (cap <= prev) continue;
    tax += (cap - prev) * rate;
    prev = cap;
    if (taxable <= limit) break;
  }
  return tax;
}

// NJ state income tax — annualized, after NJ exemptions
const NJ_BRACKETS = {

function calcNJTax(annualGross, filingStatus) {
  const taxable = Math.max(0, annualGross - NJ_EXEMPTION[filingStatus]);
  const brackets = NJ_BRACKETS[filingStatus];
  let prev = 0, tax = 0;
  for (const [limit, rate, _base] of brackets) {

    if (cap <= prev) continue;
    tax += (cap - prev) * rate;
    prev = cap;
    if (taxable <= limit) break;

}

// FICA 2025
const SS_WAGE_BASE  = 176100;
const NJ_SDI_BASE   = 161400;
const NJ_SUI_BASE   = 42300;

function calcPaycheck(grossPeriod, filingStatus, preTaxPerPeriod) {
  const preTax     = Math.min(grossPeriod, preTaxPerPeriod); // 401k/health etc.
  const ficaWages  = Math.max(0, grossPeriod - preTax);       // FICA uses pre-tax reduced
  const annualFica = ficaWages * 26;
  const annualGross = grossPeriod * 26;
  const annualFedTaxable = Math.max(0, annualGross - preTaxPerPeriod * 26);

  const ssAnnual       = Math.min(annualFica, SS_WAGE_BASE) * 0.062;
  const medicareAnnual = annualFica * 0.0145;
  const federalAnnual  = calcFederalTax(annualFedTaxable, filingStatus);
  const njAnnual       = calcNJTax(annualFedTaxable, filingStatus);
  const sdiAnnual      = Math.min(annualGross, NJ_SDI_BASE) * 0.0026;
  const fliAnnual      = Math.min(annualGross, NJ_SDI_BASE) * 0.0009;
  const suiAnnual      = Math.min(annualGross, NJ_SUI_BASE) * 0.00425;

  // Per-period amounts
  return {
    gross:       grossPeriod,
    preTax:      preTax,
    taxableWages: ficaWages,
    federal:     federalAnnual / 26,
    ss:          ssAnnual / 26,
    medicare:    medicareAnnual / 26,
    njState:     njAnnual / 26,
    njSDI:       sdiAnnual / 26,
    njFLI:       fliAnnual / 26,
    njSUI:       suiAnnual / 26,
    get totalDeductions() {
      return this.preTax + this.federal + this.ss + this.medicare +
             this.njState + this.njSDI + this.njFLI + this.njSUI;
    },
    get netPay() { return this.gross - this.totalDeductions; },
  };
}

function exportCSV(shifts, settings) {
  const rows = [

  const sorted = [...shifts].sort((a, b) => a.clockIn - b.clockIn);

    const d = new Date(s.clockIn);
    const hrs = shiftNetHrs(s);
    const pay = hrs * (s.type === "regular" ? settings.regularRate : settings.oncallRate);
    rows.push([
      d.toLocaleDateString("en-US"),
      d.toLocaleDateString("en-US", { weekday: "long" }),
      s.type === "regular" ? "Regular" : "Overtime",
      fmtTime(s.clockIn),
      s.clockOut ? fmtTime(s.clockOut) : "OPEN",
      hrs.toFixed(2),
      pay.toFixed(2),
      s.note || "",
    ]);
  }
  // Totals row
  const totalHrs = sorted.reduce((a, s) => a + shiftNetHrs(s), 0);
  const totalPay = sorted.reduce((a, s) => {
    return a + shiftNetHrs(s) * (s.type === "regular" ? settings.regularRate : settings.oncallRate);
  }, 0);
  rows.push(["TOTAL", "", "", "", "", totalHrs.toFixed(2), totalPay.toFixed(2), ""]);

  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(",")).join("\n");
  const blob = new Blob([csv], { type: "text/csv" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url;
  a.download = `timesheet-${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── YTD helper ───────────────────────────────────────────────
function getYTD(shifts, settings) {
  const lunchMs = settings.autoLunch !== false ? (settings.lunchMinutes || 30) * 60000 : 0;
  const janFirst = new Date(new Date().getFullYear(), 0, 1).getTime();
  const ytdShifts = shifts.filter(s => s.clockIn >= janFirst && s.clockOut);
  const weeks = weeksInRange(janFirst, Date.now());
  let regGross = 0, ocGross = 0;
  for (const ws of weeks) {
    const we = ws + 7 * 86400000;
    const w = ytdShifts.filter(s => s.clockIn >= ws && s.clockIn < we);
    const p = calcWeekPay(w, settings, lunchMs);
    regGross += p.regPay; ocGross += p.otPay;
  }
  return { regGross, ocGross, total: regGross + ocGross };
}

function calcWeekPay(weekShifts, settings, lunchMs) {
  const sorted = [...weekShifts].filter(s => s.clockOut).sort((a, b) => a.clockIn - b.clockIn);
  let cumHrs = 0, regHrs = 0, otHrs = 0, regPay = 0, otPay = 0;
  for (const s of sorted) {
    const hrs = shiftNetHrs(s, lunchMs);
    if (s.type === "oncall") { otHrs += hrs; otPay += hrs * settings.oncallRate; cumHrs += hrs; }
    else {
      const reg = Math.min(hrs, Math.max(0, 40 - cumHrs));
      const ot  = hrs - reg;
      regHrs += reg; otHrs += ot;
      regPay += reg * settings.regularRate; otPay += ot * settings.oncallRate; cumHrs += hrs;
    }
  }
  return { regHrs, otHrs, regPay, otPay, total: regPay + otPay };
}

function weeksInRange(startMs, endMs) {
  const starts = [];
  const d = new Date(startMs);
  const day = d.getDay();
  d.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  d.setHours(0, 0, 0, 0);
  while (d.getTime() < endMs) { starts.push(d.getTime()); d.setDate(d.getDate() + 7); }
  return starts;
}

// ── Default state ────────────────────────────────────────────
// Default anchor: most recent Monday that aligns to a biweekly cycle from 2025-01-06
const defaultAnchor = "2025-01-06";
const defaultSettings = {
  regularRate: 18, oncallRate: 27, periodAnchor: defaultAnchor,
  filingStatus: "single", preTaxPerPeriod: 0,
  regularStart: "08:00", regularEnd: "16:30",
  autoLunch: true, lunchMinutes: 30,
};

// ── Main Component ───────────────────────────────────────────
function PunchCard() {
  const [shifts, setShifts]       = useState([]);
  const [active, setActive]       = useState(null); // { id, type, clockIn }
  const [settings, setSettings]   = useState(defaultSettings);
  const [tab, setTab]             = useState("today");
  const [now, setNow]             = useState(new Date());
  const [editShift, setEditShift] = useState(null); // shift being edited
  const [note, setNote]           = useState("");
  const [flash, setFlash]         = useState(null); // "in" | "out"
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [rateInput, setRateInput]  = useState({ regularRate: "", oncallRate: "" });
  const [anchorInput, setAnchorInput] = useState(defaultAnchor);
  const [filingInput, setFilingInput]   = useState("single");
  const [preTaxInput, setPreTaxInput]   = useState("0");
  const [regStartInput, setRegStartInput] = useState("08:00");
  const [regEndInput, setRegEndInput]     = useState("16:30");
  const [autoLunchInput, setAutoLunchInput] = useState(true);
  const [lunchMinInput, setLunchMinInput]   = useState("30");
  const [showPaystub, setShowPaystub]   = useState(false);
  const [dismissedWarnings, setDismissedWarnings] = useState({});
  const [viewingPeriodOffset, setViewingPeriodOffset] = useState(0);
  const [editingActiveClockIn, setEditingActiveClockIn] = useState(false);
  const [activeClockInInput, setActiveClockInInput]     = useState("");
  const [showManualEntry, setShowManualEntry] = useState(false);
  const [manualEntry, setManualEntry] = useState({ date: "", clockIn: "", clockOut: "", type: "regular", note: "" }); // 0 = current, -1 = prev, etc.
  const loaded = useRef(false);
  const importFileRef = useRef(null);
  const [importStatus, setImportStatus] = useState(null);

  const swipeTouchStartX = useRef(null);
  const swipeTouchStartY = useRef(null);
  function handleSwipeStart(e) {
    swipeTouchStartX.current = e.touches[0].clientX;
    swipeTouchStartY.current = e.touches[0].clientY;
  }
  function handleSwipeEnd(e) {
    if (swipeTouchStartX.current === null) return;
    const dx = e.changedTouches[0].clientX - swipeTouchStartX.current;
    const dy = e.changedTouches[0].clientY - swipeTouchStartY.current;
    swipeTouchStartX.current = null; swipeTouchStartY.current = null;
    if (Math.abs(dx) < 50 || Math.abs(dx) < Math.abs(dy) * 1.5) return;
    const idx = TABS.indexOf(tab);
    if (dx < 0 && idx < TABS.length - 1) setTab(TABS[idx + 1]);
    if (dx > 0 && idx > 0)              setTab(TABS[idx - 1]);
  }

  const [swWaiting, setSwWaiting]   = useState(false);
  const swReg = useRef(null);

  // Service Worker registration + update detection
  useEffect(() => {
    if (!("serviceWorker" in navigator)) return;
    navigator.serviceWorker.register("/sw.js").then(reg => {
      swReg.current = reg;
      // Already waiting (user opened app after SW updated)
      if (reg.waiting) setSwWaiting(true);
      // New SW installed while app is open
      reg.addEventListener("updatefound", () => {
        const newWorker = reg.installing;
        newWorker?.addEventListener("statechange", () => {
          if (newWorker.statechange === "installed" && navigator.serviceWorker.controller) {
            setSwWaiting(true);
          }
        });
      });
    }).catch(() => {});
    // When SW activates after skipWaiting, reload
    navigator.serviceWorker.addEventListener("controllerchange", () => {
      window.location.reload();
    });
  }, []);

  function applyUpdate() {
    swReg.current?.waiting?.postMessage({ type: "SKIP_WAITING" });
    setSwWaiting(false);
  }

  // Clock tick — restarts on app resume so elapsed is always accurate
  const nowIntervalRef = useRef(null);

  function startNowTick() {
    clearInterval(nowIntervalRef.current);
    nowIntervalRef.current = setInterval(() => setNow(new Date()), 1000);
  }

  useEffect(() => {
    startNowTick();

    function handleVisibility() {
      if (document.visibilityState === "visible") {
        setNow(new Date());   // instant resync from clockIn timestamp
        startNowTick();       // restart interval in case iOS killed it
      }
    }

    document.addEventListener("visibilitychange", handleVisibility);
    window.addEventListener("focus", handleVisibility); // fallback for some browsers

    return () => {
      clearInterval(nowIntervalRef.current);
      document.removeEventListener("visibilitychange", handleVisibility);
      window.removeEventListener("focus", handleVisibility);
    };
  }, []);

  // Load
  useEffect(() => {
    async function load() {
      try {
        const r = await appStorage.get(STORAGE_KEY);
        if (r?.value) {
          const d = JSON.parse(r.value);
          setShifts(d.shifts || []);
          setActive(d.active || null);
          setSettings(d.settings || defaultSettings);
          setRateInput({
            regularRate: String(d.settings?.regularRate ?? defaultSettings.regularRate),
            oncallRate:  String(d.settings?.oncallRate  ?? defaultSettings.oncallRate),
          });
          setAnchorInput(d.settings?.periodAnchor ?? defaultAnchor);
          setFilingInput(d.settings?.filingStatus ?? "single");
          setPreTaxInput(String(d.settings?.preTaxPerPeriod ?? 0));
          setRegStartInput(d.settings?.regularStart ?? "08:00");
          setRegEndInput(d.settings?.regularEnd ?? "16:30");
          setAutoLunchInput(d.settings?.autoLunch !== false);
          setLunchMinInput(String(d.settings?.lunchMinutes ?? 30));
        }
      } catch {}
      loaded.current = true;
    }
    load();
  }, []);

  // Save
  async function persist(newShifts, newActive, newSettings) {
    try {
      await appStorage.set(STORAGE_KEY, JSON.stringify({
        shifts: newShifts,
        active: newActive,
        settings: newSettings,
      }));
    } catch {}
  }

  function punch() {
    const ts = Date.now();
    const regStartMin = timeStrToMin(settings.regularStart || "08:00");
    const regEndMin   = timeStrToMin(settings.regularEnd   || "16:30");
    if (!active) {
      const type = isRegularTime(ts, regStartMin, regEndMin) ? "regular" : "oncall";
      const newActive = { id: crypto.randomUUID(), type, clockIn: ts, onLunch: false, lunchStart: null, lunchDuration: 0 };
      setActive(newActive);
      setFlash("in");
      setTimeout(() => setFlash(null), 800);
      persist(shifts, newActive, settings);
    } else {
      const completed = { ...active, clockOut: ts, note: note.trim(), lunchDuration: active.lunchDuration || 0 };
      const newShifts = [completed, ...shifts];
      setShifts(newShifts);
      setActive(null);
      setNote("");
      setFlash("out");
      setTimeout(() => setFlash(null), 800);
      persist(newShifts, null, settings);
    }
  }

  function handleLunchStart() {
    const updated = { ...active, onLunch: true, lunchStart: Date.now() };
    setActive(updated);
    persist(shifts, updated, settings);
  }

  function handleLunchReturn() {
    const elapsed = Date.now() - active.lunchStart;
    const updated = { ...active, onLunch: false, lunchStart: null, lunchDuration: (active.lunchDuration || 0) + elapsed };
    setActive(updated);
    persist(shifts, updated, settings);
  }

  function saveActiveClockIn() {
    if (!activeClockInInput || !active) return;
    const newTs = new Date(activeClockInInput).getTime();
    if (isNaN(newTs) || newTs > Date.now()) return;
    const regStartMin = timeStrToMin(settings.regularStart || "08:00");
    const regEndMin   = timeStrToMin(settings.regularEnd   || "16:30");
    const updated = { ...active, clockIn: newTs, type: isRegularTime(newTs, regStartMin, regEndMin) ? "regular" : "oncall" };
    setActive(updated);
    setEditingActiveClockIn(false);
    persist(shifts, updated, settings);
  }

  function saveManualEntry() {
    const { date, clockIn, clockOut, type, note } = manualEntry;
    if (!date || !clockIn || !clockOut) return;
    const inTs  = new Date(`${date}T${clockIn}`).getTime();
    const outTs = new Date(`${date}T${clockOut}`).getTime();
    if (isNaN(inTs) || isNaN(outTs) || outTs <= inTs) return;
    const shift = { id: crypto.randomUUID(), type, clockIn: inTs, clockOut: outTs, note: note.trim() };
    const updated = [shift, ...shifts].sort((a, b) => b.clockIn - a.clockIn);
    setShifts(updated);
    setShowManualEntry(false);
    setManualEntry({ date: "", clockIn: "", clockOut: "", type: "regular", note: "" });
    persist(updated, active, settings);
  }

  function saveSettings() {
    const reg = parseFloat(rateInput.regularRate);
    const oc  = parseFloat(rateInput.oncallRate);
    if (isNaN(reg) || isNaN(oc)) return;
    const ns = {
      regularRate: reg, oncallRate: oc,
      periodAnchor: anchorInput || defaultAnchor,
      filingStatus: filingInput,
      preTaxPerPeriod: Math.max(0, parseFloat(preTaxInput) || 0),
      regularStart: regStartInput || "08:00",
      regularEnd: regEndInput || "16:30",
      autoLunch: autoLunchInput,
      lunchMinutes: Math.max(0, parseInt(lunchMinInput) || 30),
    };
    setSettings(ns);
    setSettingsOpen(false);
    persist(shifts, active, ns);
  }

  // ── Data Management ──────────────────────────────────────────
  function exportBackup() {
    const data = JSON.stringify({ version: APP_VERSION, shifts, settings, active }, null, 2);
    const blob = new Blob([data], { type: "application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url;
    a.download = `punchcard-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function importBackup(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (!Array.isArray(data.shifts) || !data.settings) throw new Error("Invalid");
        const s = data.settings;
        setShifts(data.shifts);
        setSettings(s);
        setActive(data.active || null);
        setRateInput({ regularRate: String(s.regularRate ?? 18), oncallRate: String(s.oncallRate ?? 27) });
        setAnchorInput(s.periodAnchor || defaultAnchor);
        setFilingInput(s.filingStatus || "single");
        setPreTaxInput(String(s.preTaxPerPeriod ?? 0));
        setRegStartInput(s.regularStart || "08:00");
        setRegEndInput(s.regularEnd || "16:30");
        setAutoLunchInput(s.autoLunch !== false);
        setLunchMinInput(String(s.lunchMinutes ?? 30));
        persist(data.shifts, data.active || null, s);
        setImportStatus("ok");
        setTimeout(() => setImportStatus(null), 3000);
      } catch {
        setImportStatus("err");
        setTimeout(() => setImportStatus(null), 3000);
      }
    };
    reader.readAsText(file);
  }

  function exportExcel() {
    const XLSX = window.XLSX;
    if (!XLSX) { alert("Excel library not loaded. Check your connection."); return; }
    const wb = XLSX.utils.book_new();

    // ── Sheet 1: All Shifts ──────────────────────────────────
    const sorted = [...shifts].sort((a, b) => a.clockIn - b.clockIn);
    const shiftRows = [["Date","Day","Type","Clock In","Clock Out","Gross Hrs","Lunch Hrs","Net Hrs","Rate","Gross Pay","Note"]];
    for (const s of sorted) {
      const d   = new Date(s.clockIn);
      const hrs = shiftNetHrs(s);
      const rate = s.type === "regular" ? settings.regularRate : settings.oncallRate;
      const lunchHrs = s.lunchDuration ? (s.lunchDuration / 3600000).toFixed(2)
        : s.type === "regular" ? "0.50" : "0.00";
      const grossHrs = s.clockOut ? ((s.clockOut - s.clockIn) / 3600000).toFixed(2) : "OPEN";
      shiftRows.push([
        d.toLocaleDateString("en-US"),
        d.toLocaleDateString("en-US", { weekday: "long" }),
        s.type === "regular" ? "Regular" : "Overtime",
        fmtTime(s.clockIn),
        s.clockOut ? fmtTime(s.clockOut) : "OPEN",
        grossHrs, lunchHrs,
        hrs.toFixed(2),
        rate.toFixed(2),
        (hrs * rate).toFixed(2),
        s.note || ""
      ]);
    }
    // Totals row
    const totHrs  = sorted.reduce((a, s) => a + shiftNetHrs(s), 0);
    const totPay  = sorted.reduce((a, s) => a + shiftNetHrs(s) * (s.type === "regular" ? settings.regularRate : settings.oncallRate), 0);
    shiftRows.push(["TOTAL","","","","","","",totHrs.toFixed(2),"",totPay.toFixed(2),""]);
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(shiftRows), "Shifts");

    // ── Sheet 2: Weekly Summary ───────────────────────────────
    const weekMap = {};
    for (const s of sorted) {
      const ws  = weekStart(new Date(s.clockIn));
      const key = ws.toISOString().slice(0,10);
      if (!weekMap[key]) weekMap[key] = { regHrs:0, ocHrs:0, regPay:0, ocPay:0 };
      const hrs = shiftNetHrs(s);
      if (s.type === "regular") { weekMap[key].regHrs += hrs; weekMap[key].regPay += hrs * settings.regularRate; }
      else                      { weekMap[key].ocHrs  += hrs; weekMap[key].ocPay  += hrs * settings.oncallRate;  }
    }
    const weekRows = [["Week Starting","Regular Hrs","Overtime Hrs","Total Hrs","Regular Pay","Overtime Pay","Total Pay","OT Flag"]];
    for (const [key, v] of Object.entries(weekMap)) {
      const tot = v.regHrs + v.ocHrs;
      weekRows.push([key, v.regHrs.toFixed(2), v.ocHrs.toFixed(2), tot.toFixed(2),
        v.regPay.toFixed(2), v.ocPay.toFixed(2), (v.regPay + v.ocPay).toFixed(2),
        tot > 40 ? "OVERTIME" : ""]);
    }
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(weekRows), "Weekly Summary");

    // ── Sheet 3: YTD Summary ──────────────────────────────────
    const ytd = getYTD(shifts, settings);
    const ytdRows = [
      ["Metric","Value"],
      ["YTD Regular Gross", `$${ytd.regGross.toFixed(2)}`],
      ["YTD Overtime Gross", `$${ytd.ocGross.toFixed(2)}`],
      ["YTD Total Gross",   `$${ytd.total.toFixed(2)}`],
      ["",""],
      ["Regular Hourly Rate",  `$${settings.regularRate}`],
      ["Overtime Hourly Rate",  `$${settings.oncallRate}`],
      ["Regular Hours",        `${(settings.regularStart||"08:00")} – ${(settings.regularEnd||"16:30")}`],
      ["Filing Status",        settings.filingStatus === "married" ? "Married (MFJ)" : "Single"],
      ["Pre-Tax Deductions/Period", `$${settings.preTaxPerPeriod || 0}`],
      ["",""],
      ["Export Date", new Date().toLocaleDateString("en-US")],
      ["App Version", APP_VERSION],
    ];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(ytdRows), "YTD Summary");

    XLSX.writeFile(wb, `punchcard-export-${new Date().toISOString().slice(0,10)}.xlsx`);
  }

  function deleteShift(id) {
    const updated = shifts.filter(s => s.id !== id);
    setShifts(updated);
    persist(updated, active, settings);
  }

  function saveEdit() {
    if (!editShift) return;
    const updated = shifts.map(s => s.id === editShift.id ? editShift : s);
    setShifts(updated);
    setEditShift(null);
    persist(updated, active, settings);
  }

  // ── Lunch ms ────────────────────────────────────────────────
  const lunchMs = settings.autoLunch !== false ? (settings.lunchMinutes || 30) * 60000 : 0;

  // ── Week ────────────────────────────────────────────────────
  const ws = weekStart();
  const weekDays = Array.from({ length: 7 }, (_, i) => { const d = new Date(ws); d.setDate(ws.getDate() + i); return d; });
  const weekShifts    = shifts.filter(s => s.clockIn >= ws.getTime() && s.clockOut);
  const weekTotalHrs  = weekShifts.reduce((a, s) => a + shiftNetHrs(s, lunchMs), 0);
  const weekPay       = calcWeekPay(weekShifts, settings, lunchMs);
  const otStatus      = weekTotalHrs >= 40 ? "over" : weekTotalHrs >= 35 ? "warn" : "ok";

  // ── Today (weekly OT model) ──────────────────────────────────
  const todayShifts    = shifts.filter(s => sameDay(s.clockIn, now));
  const preTodayShifts = weekShifts.filter(s => !sameDay(s.clockIn, now));
  const preTodayHrs    = preTodayShifts.reduce((a, s) => a + shiftNetHrs(s, lunchMs), 0);
  const todayCompleted = todayShifts.filter(s => s.clockOut);
  let _cum = preTodayHrs, todayRegHrs = 0, todayOTHrs = 0;
  for (const s of [...todayCompleted].sort((a, b) => a.clockIn - b.clockIn)) {
    const hrs = shiftNetHrs(s, lunchMs);
    if (s.type === "oncall") { todayOTHrs += hrs; _cum += hrs; }
    else { const reg = Math.min(hrs, Math.max(0, 40 - _cum)); todayRegHrs += reg; todayOTHrs += hrs - reg; _cum += hrs; }
  }
  const todayOCHrs = todayOTHrs;
  const todayRegPay = fmtPay(todayRegHrs, settings.regularRate);
  const todayOCPay  = fmtPay(todayOTHrs,  settings.oncallRate);

  // ── YTD ─────────────────────────────────────────────────────
  const ytd = getYTD(shifts, settings);

  // ── Warnings ────────────────────────────────────────────────
  const warnings = [];
  if (active && (now - active.clockIn) > 10 * 3600000) {
    warnings.push({ id: "stale", msg: `⚠ Open shift from ${fmtTime(active.clockIn)} — did you forget to clock out?`, color: "#c8860a", bg: "#3d2a00", border: "#c8860a" });
  }
  const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1); yesterday.setHours(12, 0, 0, 0);
  const yDay = yesterday.getDay();
  if (yDay !== 0 && yDay !== 6) {
    const yShifts = shifts.filter(s => sameDay(s.clockIn, yesterday));
    if (yShifts.length === 0 && !sameDay(yesterday, new Date(shifts[0]?.clockIn || 0))) {
      warnings.push({ id: `nopunch-${yesterday.toDateString()}`, msg: `⚠ No punches logged for ${yesterday.toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" })}`, color: "#c8860a", bg: "#3d2a00", border: "#c8860a" });
    }
  }
  if (weekTotalHrs > 40) {
    warnings.push({ id: `ot-${ws.toDateString()}`, msg: `⚠ ${fmtHrs((weekTotalHrs - 40) * 3600000)} over 40h this week — OT rate applies`, color: "#e07070", bg: "#3d1a1a", border: "#e07070" });
  }
  const activeWarnings = warnings.filter(w => !dismissedWarnings[w.id]);

  const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  const timeStr = `${pad(h % 12 || 12)}:${pad(m)}:${pad(s)} ${h >= 12 ? "PM" : "AM"}`;
  const regStartMin = timeStrToMin(settings.regularStart || "08:00");
  const regEndMin   = timeStrToMin(settings.regularEnd   || "16:30");
  const inRegular = nowMin() >= regStartMin && nowMin() < regEndMin;
  const activeElapsed = active ? now - active.clockIn : 0;
  const lunchElapsed  = active?.onLunch ? now - active.lunchStart : 0;
  const activeType = active?.type;

  return (
    <div style={{ height: "100dvh", background: "#18160f", color: "#f0ead8", fontFamily: "'Courier Prime', 'Courier New', monospace", display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Oswald:wght@400;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #3a3520; }

        .card { background: #f5f0df; color: #1a1508; border-radius: 2px; }

        .punch-btn {
          width: 140px; height: 140px; border-radius: 50%;
          border: 3px solid currentColor;
          font-family: 'Oswald', sans-serif;
          font-size: 22px; font-weight: 700; letter-spacing: 3px;
          cursor: pointer;
          transition: all 0.12s;
          display: flex; align-items: center; justify-content: center;
          flex-direction: column; gap: 4px;
        }
        .punch-btn.out-mode { background: #2d6a4f; color: #a8f0c6; border-color: #a8f0c6; }

                  <div style={{ fontSize: 13, color: "#d4b84a", letterSpacing: 2, textTransform: "uppercase", marginBottom: 14 }}>Manual Entry</div>
                  <div style={{ display: "flex", gap: 10, marginBottom: 10 }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13, color: "#b09060", letterSpacing: 1, marginBottom: 5 }}>DATE</div>
                      <input type="date" className="time-input" value={manualEntry.date}
                        onChange={e => setManualEntry(p => ({ ...p, date: e.target.value }))} />
                    </div>
                  </div>
                  <div style={{ display: "flex", gap: 10, marginBottom: 10 }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13, color: "#b09060", letterSpacing: 1, marginBottom: 5 }}>CLOCK IN</div>
                      <input type="time" className="time-input" value={manualEntry.clockIn}
                        onChange={e => setManualEntry(p => ({ ...p, clockIn: e.target.value }))} />
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13, color: "#b09060", letterSpacing: 1, marginBottom: 5 }}>CLOCK OUT</div>
                      <input type="time" className="time-input" value={manualEntry.clockOut}
                        onChange={e => setManualEntry(p => ({ ...p, clockOut: e.target.value }))} />
                    </div>
                  </div>
                  <div style={{ marginBottom: 10 }}>
                    <div style={{ fontSize: 13, color: "#b09060", letterSpacing: 1, marginBottom: 5 }}>TYPE</div>
                    <div className="type-toggle">
                      <button className={`type-btn${manualEntry.type === "regular" ? " active-reg" : ""}`}
                        onClick={() => setManualEntry(p => ({ ...p, type: "regular" }))}>Regular</button>
                      <button className={`type-btn${manualEntry.type === "oncall" ? " active-oc" : ""}`}
                        onClick={() => setManualEntry(p => ({ ...p, type: "oncall" }))}>Overtime</button>
                    </div>
                  </div>
                  <div style={{ marginBottom: 14 }}>
                    <div style={{ fontSize: 13, color: "#b09060", letterSpacing: 1, marginBottom: 5 }}>NOTE (OPTIONAL)</div>
                    <input className="time-input" placeholder="e.g. Emergency call, missed punch…"
                      value={manualEntry.note} onChange={e => setManualEntry(p => ({ ...p, note: e.target.value }))} />
                  </div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button className="save-btn" style={{ fontSize: 13, padding: "9px 20px" }} onClick={saveManualEntry}>Save Entry</button>
                    <button className="action-btn" onClick={() => setShowManualEntry(false)}>Cancel</button>
                  </div>
                </div>
              )}
            </div>

            {/* Edit modal (shared with log tab) */}

            {/* Edit modal (shared with log tab) */}
            {editShift && tab === "today" && (
              <div style={{ background: "#221e10", border: "1px solid #d4b84a", padding: 16, marginTop: 16 }}>
                <div style={{ fontSize: 13, color: "#d4b84a", letterSpacing: 2, marginBottom: 12, textTransform: "uppercase" }}>Edit Shift</div>
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 13, color: "#b09060", marginBottom: 4, letterSpacing: 1 }}>CLOCK IN</div>
                  <input type="datetime-local" className="edit-input"
                    value={new Date(editShift.clockIn - new Date().getTimezoneOffset() * 60000).toISOString().slice(0, 16)}
                    onChange={e => setEditShift(p => ({ ...p, clockIn: new Date(e.target.value).getTime() }))} />
                </div>
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 13, color: "#b09060", marginBottom: 4, letterSpacing: 1 }}>CLOCK OUT</div>
                  <input type="datetime-local" className="edit-input"
                    value={editShift.clockOut ? new Date(editShift.clockOut - new Date().getTimezoneOffset() * 60000).toISOString().slice(0, 16) : ""}
                    onChange={e => setEditShift(p => ({ ...p, clockOut: e.target.value ? new Date(e.target.value).getTime() : null }))} />
                </div>
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 13, color: "#b09060", marginBottom: 4, letterSpacing: 1 }}>LUNCH OVERRIDE (min)</div>
                  <input type="number" min="0" max="120" step="5" className="edit-input"
                    value={editShift.lunchDuration ? Math.round(editShift.lunchDuration / 60000) : ""}
                    placeholder={`auto (${settings.autoLunch !== false ? settings.lunchMinutes || 30 : 0}m)`}
                    onChange={e => setEditShift(p => ({ ...p, lunchDuration: e.target.value ? parseInt(e.target.value) * 60000 : 0 }))} />
                </div>
                <div style={{ marginBottom: 12 }}>
                  <div style={{ fontSize: 13, color: "#b09060", marginBottom: 4, letterSpacing: 1 }}>NOTE</div>
                  <input className="edit-input" value={editShift.note || ""} onChange={e => setEditShift(p => ({ ...p, note: e.target.value }))} placeholder="Optional note…" />
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <button className="save-btn" style={{ fontSize: 13, padding: "8px 20px" }} onClick={saveEdit}>Save</button>
                  <button className="action-btn" onClick={() => setEditShift(null)}>Cancel</button>
                </div>
              </div>
            )}
          </div>
        )}
        {tab === "week" && (
          <div>
            <div style={{ fontSize: 13, letterSpacing: 3, color: "#8a7840", textTransform: "uppercase", marginBottom: 16 }}>
              Week of {ws.toLocaleDateString("en-US", { month: "short", day: "numeric" })}
            </div>

            {(() => {
              let totalRegHrs = 0, totalOCHrs = 0;
              const rows = weekDays.map(day => {
                const dayShifts = shifts.filter(s => sameDay(s.clockIn, day));
                const regHrs = dayShifts.filter(s => s.type === "regular").reduce((a, s) => a + shiftNetHrs(s), 0);
                const ocHrs  = dayShifts.filter(s => s.type === "oncall").reduce((a, s)  => a + shiftNetHrs(s), 0);
                totalRegHrs += regHrs;
                totalOCHrs  += ocHrs;
                const isToday = sameDay(day, now);
                const hasOpen = isToday && active;
                const isEmpty = dayShifts.length === 0 && !hasOpen;

                return (
                  <div key={day} className={`week-day${isToday ? " today-row" : ""}`}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                      <div>
                        <div style={{ fontSize: 16, fontWeight: 700, color: isToday ? "#d4b84a" : "#a09060", letterSpacing: 1 }}>
                          {isToday ? "▶ " : ""}{dayLabel(day)}
                        </div>
                        {isEmpty && (
                          <div style={{ fontSize: 14, color: "#7a6838", marginTop: 2 }}>No punches</div>
                        )}
                        {hasOpen && (
                          <div className="incomplete">● Active shift</div>
                        )}
                        {dayShifts.map(s => (
                          <div key={s.id} style={{ fontSize: 14, color: "#b09060", marginTop: 3, display: "flex", gap: 8, alignItems: "center" }}>
                            <span className={`badge ${s.type}`} style={{ fontSize: 8 }}>{s.type === "regular" ? "R" : "OC"}</span>
                            <span>{fmtTime(s.clockIn)} → {fmtTime(s.clockOut)}</span>
                            {!s.clockOut && <span className="incomplete">OPEN</span>}
                          </div>
                        ))}
                      </div>
                      {!isEmpty && (
                        <div style={{ textAlign: "right" }}>
                          {regHrs > 0 && <div style={{ fontSize: 15, color: "#5dba8a" }}>{fmtHrs(regHrs * 3600000)}</div>}
                          {ocHrs  > 0 && <div style={{ fontSize: 15, color: "#e07070" }}>{fmtHrs(ocHrs  * 3600000)}</div>}
                          <div style={{ fontSize: 14, color: "#d4b84a", marginTop: 2 }}>
                            {fmtPay(regHrs * settings.regularRate + ocHrs * settings.oncallRate > 0 ? 1 : 0, regHrs * settings.regularRate + ocHrs * settings.oncallRate)}
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                );
              });

              return (
                <>
                  {rows}
                  <div style={{ borderTop: "2px solid #3a3218", marginTop: 16, paddingTop: 16 }}>
                    {/* OT bar */}
                    <div style={{ marginBottom: 14 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 14, letterSpacing: 1, marginBottom: 4 }}>
                        <span style={{ color: "#b09060", textTransform: "uppercase", letterSpacing: 2 }}>FLSA Overtime Threshold</span>
                        <span style={{ color: otStatus === "over" ? "#e07070" : otStatus === "warn" ? "#d4b84a" : "#5dba8a", fontFamily: "'Oswald', sans-serif", fontSize: 13 }}>
                          {fmtHrs(totalRegHrs * 3600000)} + {fmtHrs(totalOCHrs * 3600000)} = {fmtHrs((totalRegHrs + totalOCHrs) * 3600000)} / 40h
                        </span>
                      </div>
                      <div className="ot-bar-wrap">
                        <div className="ot-bar" style={{ width: `${Math.min(100, ((totalRegHrs + totalOCHrs) / 40) * 100)}%`, background: otStatus === "over" ? "#e07070" : otStatus === "warn" ? "#d4b84a" : "#5dba8a" }} />
                      </div>
                    </div>
                    <div style={{ display: "flex", gap: 10 }}>
                      <div className="stat-box">
                        <div className="stat-num" style={{ color: "#5dba8a" }}>{fmtHrs(totalRegHrs * 3600000)}</div>
                        <div className="stat-lbl">Week Regular</div>
                      </div>
                      <div className="stat-box">
                        <div className="stat-num" style={{ color: "#e07070" }}>{fmtHrs(totalOCHrs * 3600000)}</div>
                        <div className="stat-lbl">Week Overtime</div>
                      </div>
                    </div>
                    <div style={{ marginTop: 10 }} className="stat-box">
                      <div className="stat-num" style={{ color: "#d4b84a" }}>
                        {fmtPay(totalRegHrs, settings.regularRate)} + {fmtPay(totalOCHrs, settings.oncallRate)}
                      </div>
                      <div className="stat-lbl">Estimated Week Pay (Reg + Overtime)</div>
                    </div>
                  </div>
                </>
              );
            })()}
          </div>
        )}

        {/* ══════════ PAY PERIOD TAB ══════════ */}
        {tab === "period" && (() => {
          const anchor = settings.periodAnchor || defaultAnchor;
          // Offset the anchor by viewingPeriodOffset * 14 days
          const offsetAnchor = new Date(anchor);
          offsetAnchor.setDate(offsetAnchor.getDate() + viewingPeriodOffset * 14);
          // Find period start for that offset anchor relative to now (or just use anchor directly if offset)
          const periodStart = viewingPeriodOffset === 0
            ? getPeriodStart(anchor, now)
            : (() => {
                const base = getPeriodStart(anchor, now);
                const s = new Date(base);
                s.setDate(base.getDate() + viewingPeriodOffset * 14);
                return s;
              })();
          const periodEnd = new Date(periodStart);
          periodEnd.setDate(periodStart.getDate() + 13);
          const periodDays = Array.from({ length: 14 }, (_, i) => {
            const d = new Date(periodStart);
            d.setDate(periodStart.getDate() + i);
            return d;
          });

          const today0 = new Date(now); today0.setHours(0,0,0,0);
          const daysElapsed = Math.min(14, Math.max(0, Math.floor((today0 - periodStart) / 86400000) + 1));
          const isCurrentPeriod = viewingPeriodOffset === 0;
          const isFuturePeriod = viewingPeriodOffset > 0;

          let totalRegHrs = 0, totalOCHrs = 0;
          const dayRows = periodDays.map(day => {
            const dayShifts = shifts.filter(s => sameDay(s.clockIn, day));
            const regHrs = dayShifts.filter(s => s.type === "regular").reduce((a, s) => a + shiftNetHrs(s), 0);
            const ocHrs  = dayShifts.filter(s => s.type === "oncall").reduce((a, s)  => a + shiftNetHrs(s), 0);
            totalRegHrs += regHrs;
            totalOCHrs  += ocHrs;
            const isToday = sameDay(day, now);
            const isPast  = day < today0 && !isToday;
            const isFuture = day > today0;
            const hasOpen = isToday && active;
            const isEmpty = dayShifts.length === 0 && !hasOpen;
            const isWeekend = day.getDay() === 0 || day.getDay() === 6;

            return (
              <div key={day.toDateString()}
                style={{
                  borderBottom: "1px solid #2a2510",
                  padding: "9px 0",
                  borderLeft: isToday ? "3px solid #d4b84a" : isWeekend ? "3px solid #2a2510" : "3px solid transparent",
                  paddingLeft: (isToday || isWeekend) ? 10 : 0,
                  opacity: isFuture ? 0.35 : 1,
                }}
              >
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <div style={{ fontSize: 15, fontWeight: 700, color: isToday ? "#d4b84a" : isWeekend ? "#8a7840" : "#a09060", letterSpacing: 1 }}>
                      {isToday ? "▶ " : ""}{dayLabel(day)}{isWeekend ? " ·" : ""}
                    </div>
                    {isEmpty && !isFuture && (
                      <div style={{ fontSize: 13, color: isPast && !isWeekend ? "#5c1a1a" : "#3a3218", letterSpacing: 1 }}>
                        {isPast && !isWeekend ? "⚠ no punch" : "—"}
                      </div>
                    )}
                    {hasOpen && <div className="incomplete" style={{ fontSize: 13 }}>● Active</div>}
                    {dayShifts.map(s => (
                      <div key={s.id} style={{ fontSize: 13, color: "#b09060", marginTop: 2, display: "flex", gap: 6, alignItems: "center" }}>
                        <span className={`badge ${s.type}`} style={{ fontSize: 7, padding: "1px 5px" }}>{s.type === "regular" ? "R" : "OC"}</span>
                        <span>{fmtTime(s.clockIn)} → {fmtTime(s.clockOut)}</span>
                      </div>
                    ))}
                  </div>
                  {!isEmpty && (
                    <div style={{ textAlign: "right" }}>
                      {regHrs > 0 && <div style={{ fontSize: 14, color: "#5dba8a" }}>{fmtHrs(regHrs * 3600000)}</div>}
                      {ocHrs  > 0 && <div style={{ fontSize: 14, color: "#e07070" }}>{fmtHrs(ocHrs  * 3600000)}</div>}
                      <div style={{ fontSize: 14, color: "#d4b84a" }}>
                        {fmtPay(regHrs, settings.regularRate) !== "$0.00" || fmtPay(ocHrs, settings.oncallRate) !== "$0.00"
                          ? (regHrs > 0 && ocHrs > 0
                              ? `${fmtPay(regHrs, settings.regularRate)} + ${fmtPay(ocHrs, settings.oncallRate)}`
                              : regHrs > 0 ? fmtPay(regHrs, settings.regularRate) : fmtPay(ocHrs, settings.oncallRate))
                          : ""}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            );
          });

          const totalPay = totalRegHrs * settings.regularRate + totalOCHrs * settings.oncallRate;
          // Projected pay (if current period, project based on daily average so far)
          const workdaysSoFar = periodDays.slice(0, daysElapsed).filter(d => d.getDay() !== 0 && d.getDay() !== 6).length;
          const workdaysTotal = periodDays.filter(d => d.getDay() !== 0 && d.getDay() !== 6).length;
          const projectedPay = isCurrentPeriod && workdaysSoFar > 0
            ? (totalPay / workdaysSoFar) * workdaysTotal
            : null;

          const progressPct = isCurrentPeriod ? Math.min(100, (daysElapsed / 14) * 100) : (viewingPeriodOffset < 0 ? 100 : 0);

          return (
            <div>
              {/* Period nav */}
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
                <button className="action-btn" onClick={() => setViewingPeriodOffset(v => v - 1)}>◀ Prev</button>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 14, letterSpacing: 2, color: "#d4b84a", textTransform: "uppercase" }}>
                    {isCurrentPeriod ? "Current Period" : isFuturePeriod ? "Future Period" : `${Math.abs(viewingPeriodOffset)} Period${Math.abs(viewingPeriodOffset) > 1 ? "s" : ""} Ago`}
                  </div>
                  <div style={{ fontSize: 15, color: "#a09060", marginTop: 2 }}>
                    {fmtDateShort(periodStart)} – {fmtDateShort(periodEnd)}
                  </div>
                </div>
                <button className="action-btn" onClick={() => setViewingPeriodOffset(v => v + 1)} disabled={viewingPeriodOffset >= 0} style={{ opacity: viewingPeriodOffset >= 0 ? 0.3 : 1 }}>Next ▶</button>
              </div>

              {/* Progress bar */}
              {isCurrentPeriod && (
                <div style={{ marginBottom: 20 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, color: "#8a7840", letterSpacing: 1, marginBottom: 5, textTransform: "uppercase" }}>
                    <span>Day {daysElapsed} of 14</span>
                    <span>{14 - daysElapsed} days remaining</span>
                  </div>
                  <div style={{ height: 4, background: "#221e10", borderRadius: 2 }}>
                    <div style={{ height: "100%", width: `${progressPct}%`, background: "#d4b84a", borderRadius: 2, transition: "width 0.5s" }} />
                  </div>
                </div>
              )}

              {/* Summary stats */}
              <div style={{ display: "flex", gap: 10, marginBottom: 10 }}>
                <div className="stat-box">
                  <div className="stat-num" style={{ color: "#5dba8a" }}>{fmtHrs(totalRegHrs * 3600000)}</div>
                  <div className="stat-lbl">Regular Hrs</div>
                </div>
                <div className="stat-box">
                  <div className="stat-num" style={{ color: "#e07070" }}>{fmtHrs(totalOCHrs * 3600000)}</div>
                  <div className="stat-lbl">Overtime Hrs</div>
                </div>
              </div>
              <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
                <div className="stat-box">
                  <div className="stat-num" style={{ color: "#d4b84a", fontSize: 20 }}>{fmtPay(totalRegHrs, settings.regularRate)}</div>
                  <div className="stat-lbl">Regular Pay</div>
                </div>
                <div className="stat-box">
                  <div className="stat-num" style={{ color: "#d4b84a", fontSize: 20 }}>{fmtPay(totalOCHrs, settings.oncallRate)}</div>
                  <div className="stat-lbl">Overtime Pay</div>
                </div>
              </div>
              <div className="stat-box" style={{ marginBottom: 20 }}>
                <div className="stat-num" style={{ color: "#d4b84a" }}>{fmtPay(totalPay, 1)}</div>
                <div className="stat-lbl">Total Earned This Period</div>
                {projectedPay !== null && projectedPay > totalPay && (
                  <div style={{ fontSize: 14, color: "#b09060", marginTop: 6 }}>
                    Projected: ~{fmtPay(projectedPay, 1)} based on {workdaysSoFar} workday{workdaysSoFar !== 1 ? "s" : ""} so far
                  </div>
                )}
              </div>

              {/* ── YTD + Wage Base Countdowns ── */}
              <div style={{ marginBottom: 20 }}>
                <button
                  onClick={() => setDismissedWarnings(p => ({ ...p, ytdOpen: !p.ytdOpen }))}
                  style={{ width: "100%", background: "#221e10", border: "1px solid #3a3218", color: "#a09060", fontFamily: "'Oswald', sans-serif", fontSize: 15, letterSpacing: 3, textTransform: "uppercase", padding: "11px 16px", cursor: "pointer", textAlign: "left", display: "flex", justifyContent: "space-between" }}
                >
                  <span>📊 YTD Earnings & Wage Base Caps</span>
                  <span>{dismissedWarnings.ytdOpen ? "▲" : "▼"}</span>
                </button>
                {dismissedWarnings.ytdOpen && (
                  <div style={{ background: "#0e0c07", border: "1px solid #3a3218", borderTop: "none", padding: "14px 16px" }}>
                    <div style={{ fontSize: 13, color: "#8a7840", letterSpacing: 2, textTransform: "uppercase", marginBottom: 10 }}>Year {new Date().getFullYear()} to date</div>
                    <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
                      <div className="stat-box" style={{ flex: 1 }}>
                        <div className="stat-num" style={{ color: "#5dba8a", fontSize: 18 }}>{fmtPay(ytd.regGross, 1)}</div>
                        <div className="stat-lbl">YTD Regular</div>
                      </div>
                      <div className="stat-box" style={{ flex: 1 }}>
                        <div className="stat-num" style={{ color: "#e07070", fontSize: 18 }}>{fmtPay(ytd.ocGross, 1)}</div>
                        <div className="stat-lbl">YTD Overtime</div>
                      </div>
                    </div>
                    <div className="stat-box" style={{ marginBottom: 20 }}>
                      <div className="stat-num" style={{ color: "#d4b84a", fontSize: 22 }}>{fmtPay(ytd.total, 1)}</div>
                      <div className="stat-lbl">YTD Total Gross</div>
                    </div>

                    {/* Wage base caps */}
                    {[
                      { label: "Social Security (6.2%)", cap: SS_WAGE_BASE, desc: "Tax stops at cap — take-home increases" },
                      { label: "NJ SDI (0.26%)", cap: NJ_SDI_BASE, desc: "NJ disability insurance deduction stops" },
                      { label: "NJ SUI/WF (0.425%)", cap: NJ_SUI_BASE, desc: "Unemployment / workforce tax stops" },
                    ].map(({ label, cap, desc }) => {
                      const pct = Math.min(100, (ytd.total / cap) * 100);
                      const remaining = Math.max(0, cap - ytd.total);
                      const hit = ytd.total >= cap;
                      return (
                        <div key={label} style={{ marginBottom: 14 }}>
                          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 14, marginBottom: 3 }}>
                            <span style={{ color: hit ? "#5dba8a" : "#b09060", letterSpacing: 1 }}>{label}</span>
                            <span style={{ color: hit ? "#5dba8a" : "#a09060", fontFamily: "'Oswald', sans-serif" }}>
                              {hit ? "✓ CAP HIT" : `${fmtPay(remaining, 1)} to cap`}
                            </span>
                          </div>
                          <div className="wage-bar-wrap">
                            <div className="wage-bar" style={{ width: `${pct}%`, background: hit ? "#5dba8a" : pct > 75 ? "#d4b84a" : "#3a5a3a" }} />
                          </div>
                          <div style={{ fontSize: 9, color: "#7a6838", marginTop: 3, letterSpacing: 1 }}>
                            {fmtPay(ytd.total, 1)} / {fmtPay(cap, 1)} cap · {hit ? desc : `${pct.toFixed(0)}%`}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>

              {/* ── Net Pay Estimate ── */}
              {totalPay > 0 && (() => {
                const pc = calcPaycheck(totalPay, settings.filingStatus || "single", settings.preTaxPerPeriod || 0);
                const projPc = projectedPay ? calcPaycheck(projectedPay, settings.filingStatus || "single", settings.preTaxPerPeriod || 0) : null;
                const row = (label, amount, color = "#a09060", bold = false) => (
                  <div style={{ display: "flex", justifyContent: "space-between", padding: "7px 0", borderBottom: "1px solid #2a2510", fontSize: bold ? 17 : 14 }}>
                    <span style={{ color: "#b09060", letterSpacing: 1 }}>{label}</span>
                    <span style={{ color, fontWeight: bold ? 700 : 400 }}>{typeof amount === "number" ? fmtPay(amount, 1) : amount}</span>
                  </div>
                );
                return (
                  <div style={{ marginBottom: 20 }}>
                    <button
                      onClick={() => setShowPaystub(p => !p)}
                      style={{ width: "100%", background: "#221e10", border: "1px solid #3a3218", color: "#d4b84a", fontFamily: "'Oswald', sans-serif", fontSize: 15, letterSpacing: 3, textTransform: "uppercase", padding: "11px 16px", cursor: "pointer", textAlign: "left", display: "flex", justifyContent: "space-between" }}
                    >
                      <span>💵 Est. Paycheck After Deductions</span>
                      <span>{showPaystub ? "▲" : "▼"}</span>
                    </button>
                    {showPaystub && (
                      <div style={{ background: "#0e0c07", border: "1px solid #3a3218", borderTop: "none", padding: "0 16px 4px" }}>
                        <div style={{ fontSize: 13, letterSpacing: 2, color: "#8a7840", textTransform: "uppercase", padding: "12px 0 4px" }}>
                          {(settings.filingStatus === "married" ? "MFJ" : "Single")} · NJ · 2025 estimates · {isCurrentPeriod ? `${workdaysSoFar} workdays logged` : "full period"}
                        </div>

                        {row("Gross Pay", pc.gross, "#f0ead8", false)}
                        {pc.preTax > 0 && row("Pre-Tax Deductions", -pc.preTax, "#e07070")}
                        {row("Federal Withholding", -pc.federal, "#e07070")}
                        {row("Social Security (6.2%)", -pc.ss, "#e07070")}
                        {row("Medicare (1.45%)", -pc.medicare, "#e07070")}

                        <div style={{ fontSize: 13, letterSpacing: 2, color: "#8a7840", textTransform: "uppercase", padding: "10px 0 4px" }}>NJ State</div>
                        {row("NJ Income Tax", -pc.njState, "#e07070")}
                        {row("NJ SDI (0.26%)", -pc.njSDI, "#c06050")}
                        {row("NJ FLI (0.09%)", -pc.njFLI, "#c06050")}
                        {row("NJ SUI/WF (0.425%)", -pc.njSUI, "#c06050")}

                        <div style={{ borderTop: "2px solid #3a3218", marginTop: 4, padding: "12px 0" }}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                            <span style={{ fontFamily: "'Oswald', sans-serif", fontSize: 13, letterSpacing: 3, color: "#5dba8a", textTransform: "uppercase" }}>Est. Net Pay</span>
                            <span style={{ fontFamily: "'Oswald', sans-serif", fontSize: 28, color: "#5dba8a", fontWeight: 700 }}>{fmtPay(Math.max(0, pc.netPay), 1)}</span>
                          </div>
                          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 4, fontSize: 14, color: "#8a7840" }}>
                            <span>Effective tax rate</span>
                            <span>{pc.gross > 0 ? ((pc.totalDeductions - pc.preTax) / pc.gross * 100).toFixed(1) : 0}%</span>
                          </div>
                          {projPc && projPc.gross > pc.gross && (
                            <div style={{ marginTop: 10, padding: "8px 10px", background: "#221e10", border: "1px solid #3a3218", fontSize: 14, color: "#b09060", display: "flex", justifyContent: "space-between" }}>
                              <span>Projected net (full period)</span>
                              <span style={{ color: "#a09060" }}>~{fmtPay(Math.max(0, projPc.netPay), 1)}</span>
                            </div>
                          )}
                        </div>
                        <div style={{ fontSize: 9, color: "#7a6838", paddingBottom: 10, lineHeight: 1.6 }}>
                          * Estimates only. Based on annualized gross × 26. Does not account for YTD wage base limits, additional W-4 adjustments, or employer benefits. Consult your paystub or HR for exact figures.
                        </div>
                      </div>
                    )}
                  </div>
                );
              })()}

              {/* Day-by-day */}
              <div style={{ fontSize: 13, letterSpacing: 3, color: "#8a7840", textTransform: "uppercase", marginBottom: 8 }}>Daily Breakdown</div>
              {dayRows}
            </div>
          );
        })()}

        {/* ══════════ LOG TAB ══════════ */}
        {tab === "log" && (
          <div>
            {shifts.length > 0 && (
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                <div style={{ fontSize: 13, color: "#8a7840", letterSpacing: 2, textTransform: "uppercase" }}>{shifts.length} shift{shifts.length !== 1 ? "s" : ""} total</div>
                <button className="action-btn" style={{ borderColor: "#d4b84a", color: "#d4b84a" }}
                  onClick={() => exportCSV(shifts, settings)}>
                  ↓ Export CSV
                </button>
              </div>
            )}

            {active && (
              <div style={{ background: "#1a3d2a", border: "1px solid #2d6a4f", padding: "10px 14px", marginBottom: 16, fontSize: 15, color: "#5dba8a" }}>
                ● Active shift in progress since {fmtTime(active.clockIn)}
              </div>
            )}

            {shifts.length === 0 && (
              <div style={{ color: "#7a6838", fontSize: 15, letterSpacing: 2, textTransform: "uppercase", textAlign: "center", marginTop: 60 }}>No shifts logged yet</div>
            )}

            {editShift && (
              <div style={{ background: "#221e10", border: "1px solid #d4b84a", padding: 16, marginBottom: 16 }}>
                <div style={{ fontSize: 13, color: "#d4b84a", letterSpacing: 2, marginBottom: 12, textTransform: "uppercase" }}>Edit Shift</div>
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 13, color: "#b09060", marginBottom: 4, letterSpacing: 1 }}>CLOCK IN</div>
                  <input type="datetime-local" className="edit-input"
                    value={new Date(editShift.clockIn - new Date().getTimezoneOffset() * 60000).toISOString().slice(0, 16)}
                    onChange={e => setEditShift(p => ({ ...p, clockIn: new Date(e.target.value).getTime() }))}
                  />
                </div>
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 13, color: "#b09060", marginBottom: 4, letterSpacing: 1 }}>CLOCK OUT</div>
                  <input type="datetime-local" className="edit-input"
                    value={editShift.clockOut ? new Date(editShift.clockOut - new Date().getTimezoneOffset() * 60000).toISOString().slice(0, 16) : ""}
                    onChange={e => setEditShift(p => ({ ...p, clockOut: e.target.value ? new Date(e.target.value).getTime() : null }))}
                  />
                </div>
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 13, color: "#b09060", marginBottom: 4, letterSpacing: 1 }}>LUNCH OVERRIDE (min)</div>
                  <input type="number" min="0" max="120" step="5" className="edit-input"
                    value={editShift.lunchDuration ? Math.round(editShift.lunchDuration / 60000) : ""}
                    placeholder={`auto (${settings.autoLunch !== false ? settings.lunchMinutes || 30 : 0}m)`}
                    onChange={e => setEditShift(p => ({ ...p, lunchDuration: e.target.value ? parseInt(e.target.value) * 60000 : 0 }))} />
                </div>
                <div style={{ marginBottom: 12 }}>
                  <div style={{ fontSize: 13, color: "#b09060", marginBottom: 4, letterSpacing: 1 }}>NOTE</div>
                  <input className="edit-input" value={editShift.note || ""} onChange={e => setEditShift(p => ({ ...p, note: e.target.value }))} placeholder="Optional note…" />
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <button className="save-btn" style={{ fontSize: 13, padding: "8px 20px" }} onClick={saveEdit}>Save</button>
                  <button className="action-btn" onClick={() => setEditShift(null)}>Cancel</button>
                </div>
              </div>
            )}

            {shifts.map(shift => (
              <div key={shift.id} className="shift-row">
                <span className={`badge ${shift.type}`}>{shift.type === "regular" ? "REG" : "Overtime"}</span>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 15 }}>
                    {new Date(shift.clockIn).toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" })}
                  </div>
                  <div style={{ fontSize: 14, color: "#b09060", marginTop: 2 }}>
                    {fmtTime(shift.clockIn)} → {shift.clockOut ? fmtTime(shift.clockOut) : <span className="incomplete">OPEN</span>}
                    {shift.type === "regular" && shift.clockOut && <span style={{ color: "#8a7840" }}> (−30m lunch)</span>}
                  </div>
                  {shift.note && <div style={{ fontSize: 14, color: "#9a8850", marginTop: 2 }}>{shift.note}</div>}
                </div>
                <div style={{ textAlign: "right", marginRight: 8 }}>
                  <div style={{ fontSize: 13, color: "#d4b84a" }}>{fmtHrs(shiftNetMs(shift))}</div>
                  <div style={{ fontSize: 14, color: "#b09060" }}>{fmtPay(shiftNetHrs(shift), shift.type === "regular" ? settings.regularRate : settings.oncallRate)}</div>
                </div>
                <button className="action-btn" style={{ marginRight: 4 }} onClick={() => setEditShift({ ...shift })} style={{ marginRight: 4, padding: "5px 14px", fontSize: 13, letterSpacing: 1 }}>Edit</button>
                <button className="action-btn danger" onClick={() => deleteShift(shift.id)}>×</button>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(PunchCard));
  </script>
  <script>
    if ("serviceWorker" in navigator && location.protocol === "https:" && !location.hostname.includes("claudeusercontent")) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
